<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Therapist Utterance Classifier</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
    .container { max-width: 640px; width: 100%; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p.desc { color: #94a3b8; margin-bottom: 24px; font-size: 0.9rem; }
    textarea { width: 100%; height: 100px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; color: #e2e8f0; font-size: 1rem; resize: vertical; }
    textarea:focus { outline: none; border-color: #60a5fa; }
    button { margin-top: 12px; padding: 10px 24px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #2563eb; }
    button:disabled { background: #475569; cursor: not-allowed; }
    .result { margin-top: 24px; padding: 16px; background: #1e293b; border-radius: 8px; display: none; }
    .result .label { font-size: 0.85rem; color: #94a3b8; }
    .result .value { font-size: 1.8rem; font-weight: 700; margin-top: 4px; }
    .DIRECTED { color: #f87171; }
    .GUIDED { color: #facc15; }
    .NONE { color: #4ade80; }
    .history { margin-top: 32px; }
    .history h2 { font-size: 1.1rem; margin-bottom: 12px; }
    .history-item { padding: 12px; background: #1e293b; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .history-item .text { flex: 1; font-size: 0.9rem; color: #cbd5e1; margin-right: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-item .tag { padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }
    .tag.DIRECTED { background: #451a1a; }
    .tag.GUIDED { background: #422006; }
    .tag.NONE { background: #052e16; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Therapist Utterance Classifier</h1>
    <p class="desc">Enter a therapist utterance to classify as DIRECTED, GUIDED, or NONE.</p>
    <textarea id="input" placeholder="e.g. Now I want you to raise your left arm slowly..."></textarea>
    <button id="btn" onclick="classify()">Classify</button>
    <div class="result" id="result">
      <div class="label">Classification</div>
      <div class="value" id="classification"></div>
    </div>
    <div class="history" id="historySection" style="display:none">
      <h2>History</h2>
      <div id="historyList"></div>
    </div>
  </div>
  <script>
    const history = [];

    async function classify() {
      const input = document.getElementById("input");
      const btn = document.getElementById("btn");
      const text = input.value.trim();
      if (!text) return;

      btn.disabled = true;
      btn.textContent = "Classifying...";

      try {
        const res = await fetch("/classify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        const data = await res.json();
        const cls = data.classification || "ERROR";
        const clean = cls.match(/DIRECTED|GUIDED|NONE/)?.[0] || cls;

        document.getElementById("result").style.display = "block";
        const el = document.getElementById("classification");
        el.textContent = clean;
        el.className = "value " + clean;

        history.unshift({ text, cls: clean });
        renderHistory();
        input.value = "";
      } catch (e) {
        alert("Error: " + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Classify";
      }
    }

    function renderHistory() {
      const section = document.getElementById("historySection");
      const list = document.getElementById("historyList");
      if (history.length === 0) { section.style.display = "none"; return; }
      section.style.display = "block";
      list.innerHTML = history.map(h =>
        `<div class="history-item">
          <div class="text">${h.text.replace(/</g, "&lt;")}</div>
          <div class="tag ${h.cls}">${h.cls}</div>
        </div>`
      ).join("");
    }

    document.getElementById("input").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); classify(); }
    });
  </script>
</body>
</html>
